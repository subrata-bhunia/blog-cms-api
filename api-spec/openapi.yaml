openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Blog CMS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: posts
    description: Public blog post operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /posts:
    get:
      operationId: getPublicPosts
      tags: [posts]
      summary: Get public posts by clientId
      description: Public endpoint to fetch published posts for a specific client (for static site integration)
      parameters:
        - name: clientId
          in: query
          required: true
          schema:
            type: string
          description: The user/client ID to filter posts by
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Max number of posts to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Pagination offset
      responses:
        "200":
          description: List of published posts for the given client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicPostsResponse"
        "400":
          description: Missing clientId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Category:
      type: object
      properties:
        id:
          type: string
        clientId:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        postCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - clientId
        - name
        - slug
        - postCount
        - createdAt
        - updatedAt

    Tag:
      type: object
      properties:
        id:
          type: string
        clientId:
          type: string
        name:
          type: string
        slug:
          type: string
        postCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - clientId
        - name
        - slug
        - postCount
        - createdAt
        - updatedAt

    PublicPost:
      type: object
      properties:
        id:
          type: string
        clientId:
          type: string
        title:
          type: string
        slug:
          type: string
        content:
          type: string
        excerpt:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, published]
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
        featuredImage:
          type: string
          nullable: true
        metaTitle:
          type: string
          nullable: true
        metaDescription:
          type: string
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - clientId
        - title
        - slug
        - content
        - status
        - categories
        - tags
        - createdAt
        - updatedAt

    PublicPostsResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/PublicPost"
        total:
          type: integer
        clientId:
          type: string
      required:
        - posts
        - total
        - clientId

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
